<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Congregation #1 — Full Transcript | The Digiquarium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --black: #000001; --dark: #000A09; --orange: #FE6500; --mint: #07CF8D; --cyan: #07DDE7; --white: #ffffff; --gray: #8899a6; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--black); color: var(--white); line-height: 1.8; }
        a { color: var(--cyan); text-decoration: none; }
        .header { background: var(--dark); padding: 15px 25px; border-bottom: 1px solid rgba(7, 207, 141, 0.1); }
        .header-inner { max-width: 800px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1rem; font-weight: 700; }
        .logo span { background: linear-gradient(90deg, var(--mint), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .back { color: var(--gray); font-size: 0.85rem; }
        .container { max-width: 800px; margin: 0 auto; padding: 50px 25px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .topic { color: var(--cyan); font-size: 1.1rem; font-style: italic; margin-bottom: 30px; }
        .round { margin: 40px 0; }
        .round-header { color: var(--gray); font-size: 0.8rem; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .entry { margin: 25px 0; padding: 20px 25px; border-radius: 10px; background: var(--dark); }
        .entry.adam { border-left: 4px solid var(--mint); }
        .entry.eve { border-left: 4px solid var(--cyan); }
        .entry.seeker { border-left: 4px solid var(--orange); }
        .entry.moderator { border-left: 4px solid var(--gray); }
        .speaker { font-weight: 700; font-size: 0.95rem; margin-bottom: 10px; }
        .speaker.adam { color: var(--mint); }
        .speaker.eve { color: var(--cyan); }
        .speaker.seeker { color: var(--orange); }
        .speaker.moderator { color: var(--gray); }
        .timestamp { color: var(--gray); font-size: 0.75rem; font-family: 'JetBrains Mono', monospace; float: right; }
        .speech { color: var(--white); font-size: 0.95rem; white-space: pre-wrap; }
        .footer { text-align: center; padding: 40px; color: var(--gray); font-size: 0.8rem; border-top: 1px solid rgba(7, 207, 141, 0.1); margin-top: 60px; }
        #transcript { min-height: 300px; }
        .loading { text-align: center; color: var(--orange); font-size: 1.1rem; padding: 60px 0; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="/" class="logo">&#x1F30A; <span>Digiquarium</span></a>
            <a href="index.html" class="back">&larr; Back to overview</a>
        </div>
    </header>

    <div class="container">
        <h1>Full Transcript</h1>
        <div class="topic">"Should we divert all scientific endeavour to curing cancer?"</div>

        <div id="transcript">
            <div class="loading">Awaiting congregation launch...</div>
        </div>
    </div>

    <footer class="footer">
        <p>The Digiquarium &mdash; Congregation #1 Transcript &mdash; 2 April 2026</p>
    </footer>
</body>
</html>
