networks:
  isolated-net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.30.0.0/16

services:
  # ==========================================================================
  # KIWIX SERVERS
  # ==========================================================================
  
  kiwix-simple:
    image: ghcr.io/kiwix/kiwix-serve:3.7.0
    container_name: digiquarium-kiwix-simple
    volumes:
      - ./kiwix-data:/data:ro
    command: "wikipedia_en_simple_all_nopic_2026-02.zim"
    restart: unless-stopped
    networks:
      isolated-net:
        ipv4_address: 172.30.0.10

  kiwix-maxi:
    image: ghcr.io/kiwix/kiwix-serve:3.7.0
    container_name: digiquarium-kiwix-maxi
    volumes:
      - ./kiwix-data:/data:ro
    command: "wikipedia_en_simple_all_maxi_2026-02.zim"
    restart: unless-stopped
    networks:
      isolated-net:
        ipv4_address: 172.30.0.12
    profiles: ["visual"]

  kiwix-spanish:
    image: ghcr.io/kiwix/kiwix-serve:3.7.0
    container_name: digiquarium-kiwix-spanish
    volumes:
      - ./kiwix-data:/data:ro
    command: "wikipedia_es_all_nopic_2025-10.zim"
    restart: unless-stopped
    networks:
      isolated-net:
        ipv4_address: 172.30.0.13
    profiles: ["languages"]

  kiwix-german:
    image: ghcr.io/kiwix/kiwix-serve:3.7.0
    container_name: digiquarium-kiwix-german
    volumes:
      - ./kiwix-data:/data:ro
    command: "wikipedia_de_all_nopic_2026-01.zim"
    restart: unless-stopped
    networks:
      isolated-net:
        ipv4_address: 172.30.0.14
    profiles: ["languages"]

  kiwix-chinese:
    image: ghcr.io/kiwix/kiwix-serve:3.7.0
    container_name: digiquarium-kiwix-chinese
    volumes:
      - ./kiwix-data:/data:ro
    command: "wikipedia_zh_all_nopic_2025-09.zim"
    restart: unless-stopped
    networks:
      isolated-net:
        ipv4_address: 172.30.0.20
    profiles: ["languages"]

  kiwix-japanese:
    image: ghcr.io/kiwix/kiwix-serve:3.7.0
    container_name: digiquarium-kiwix-japanese
    volumes:
      - ./kiwix-data:/data:ro
    command: "wikipedia_ja_all_nopic_2025-10.zim"
    restart: unless-stopped
    networks:
      isolated-net:
        ipv4_address: 172.30.0.21
    profiles: ["languages"]

  # ==========================================================================
  # ==========================================================================
  # OLLAMA (LOCAL) - CRITICAL INFRASTRUCTURE
  # ==========================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: digiquarium-ollama
    volumes:
      - ./ollama-data:/root/.ollama
      - ./logs/ollama:/var/log/ollama
    environment:
      - OLLAMA_DEBUG=INFO
      - OLLAMA_HOST=0.0.0.0:11434
    restart: always
    mem_limit: 2g
    memswap_limit: 3g
    mem_reservation: 512m
    oom_kill_disable: false
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      isolated-net:
        ipv4_address: 172.30.0.11
      default:

  # ==========================================================================
  # TANK 01: ADAM - Male Control (English Simple)
  # ==========================================================================
  tank-01-adam:
    image: digiquarium-tank:latest
    container_name: tank-01-adam
    working_dir: /tank
    environment:
      - TANK_NAME=adam
      - TANK_ID=tank-01
      - GENDER=a man
      - KIWIX_URL=http://digiquarium-kiwix-simple:8080
      - WIKI_BASE=/wikipedia_en_simple_all_nopic_2026-02
      - OLLAMA_URL=http://digiquarium-ollama:11434
      - OLLAMA_MODEL=llama3.2:latest
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY:-}
      - CEREBRAS_MODEL=${CEREBRAS_MODEL:-llama3.1-8b}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY:-}
      - TOGETHER_MODEL=${TOGETHER_MODEL:-meta-llama/Llama-3.3-70B-Instruct-Turbo}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.1-8b-instant}
      - LOG_DIR=/logs
      - TZ=Australia/Melbourne
    volumes:
      - ./src/explorer:/tank:ro
      - ./config/tanks:/config:ro
      - ./shared:/shared
      - ./logs/tank-01-adam:/logs
    command: ["bash", "/tank/start.sh"]
    depends_on:
      kiwix-simple:
        condition: service_started
      ollama:
        condition: service_started
    networks:
      isolated-net:
        ipv4_address: 172.30.1.1
      default:
    dns: ["8.8.8.8"]
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

