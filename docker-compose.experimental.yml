# Experimental tanks — run with: docker compose -f docker-compose.yml -f docker-compose.experimental.yml up -d
services:
  tank-historical-gandhi:
    image: digiquarium-tank:latest
    container_name: tank-historical-gandhi
    working_dir: /tank
    environment:
      - TANK_NAME=gandhi
      - TANK_ID=tank-historical-gandhi
      - GENDER=a man
      - TANK_TYPE=historical
      - KIWIX_URL=http://digiquarium-kiwix-simple:8080
      - WIKI_BASE=/wikipedia_en_simple_all_nopic_2026-02
      - OLLAMA_URL=http://digiquarium-ollama:11434
      - OLLAMA_MODEL=llama3.2:latest
      - INFERENCE_PROXY_URL=http://digiquarium-inference-proxy:8100
      - LOG_DIR=/logs
      - TZ=Australia/Melbourne
    volumes:
      - ./src/explorer:/tank:ro
      - ./config/tanks:/config:ro
      - ./shared:/shared
      - ./logs/tank-historical-gandhi:/logs
    command: ["bash", "/tank/start.sh"]
    networks:
      isolated-net:
        ipv4_address: 172.30.4.1
    cap_drop: [ALL]
    user: "1000:1000"
    read_only: true
    tmpfs: [/tmp]
    security_opt:
      - no-new-privileges:true
      - seccomp:config/seccomp-tank.json
    restart: "no"

